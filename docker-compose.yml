services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pccms-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
