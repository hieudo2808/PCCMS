name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== Backend ====================
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Generate application.yml from secrets
        run: |
          cat > src/main/resources/application.yml << 'EOF'
          server:
              port: 8080
          
          spring:
              application:
                  name: pccms
              datasource:
                  url: ${{ secrets.DB_URL }}
                  username: ${{ secrets.DB_USERNAME }}
                  password: ${{ secrets.DB_PASSWORD }}
                  driver-class-name: org.postgresql.Driver
              jpa:
                  hibernate:
                      ddl-auto: validate
                  show-sql: false
                  properties:
                      hibernate:
                          format_sql: true
                          dialect: org.hibernate.dialect.PostgreSQLDialect
              data:
                  redis:
                      host: ${{ secrets.REDIS_HOST }}
                      port: ${{ secrets.REDIS_PORT }}
                      password: ${{ secrets.REDIS_PASSWORD }}
                      ssl:
                          enabled: ${{ secrets.REDIS_SSL_ENABLED }}
              mail:
                  host: smtp.gmail.com
                  port: 587
                  username: ${{ secrets.MAIL_USERNAME }}
                  password: ${{ secrets.MAIL_PASSWORD }}
                  properties:
                      mail:
                          smtp:
                              auth: true
                              starttls:
                                  enable: true
                                  required: true
          
          jwt:
              secret: ${{ secrets.JWT_SECRET }}
              expiration: 600000
              refresh-expiration: 604800000
          
          security:
              pepper: ${{ secrets.SECURITY_PEPPER }}
          
          app:
              cors:
                  allowed-origins: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          
          management:
              endpoints:
                  web:
                      exposure:
                          include: health,info,metrics
              endpoint:
                  health:
                      show-details: when_authorized
              health:
                  mail:
                      enabled: false
          
          logging:
              level:
                  root: INFO
                  com.astral.express: DEBUG
                  org.springframework.security: INFO
          EOF

      - name: Build with Maven
        run: |
          chmod +x ./mvnw
          ./mvnw clean compile -q

  # ==================== Frontend ====================
  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Create .env
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7